[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[[redirects]]
  from = "/*"
  to = "https://poppas-vertical-spread-screener.onrender.com/:splat"
  status = 302
  force = true

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/yahoo-finance2/**"]
